function renderProducts() {
    const container = document.getElementById("productGrid");
    container.innerHTML = "";

    products.forEach(p => {
        container.innerHTML += `
        <div class="col-md-3 mb-4">
            <div class="product-card text-center">

                <div class="img-box">
                    <img src="${p.img}">
                </div>

                <h6 class="mt-2">${p.title}</h6>

                <div>
                    <span class="price">₹${p.price}/${p.unit}</span><br>
                    <span class="original-price">₹${p.original}</span>
                </div>

                <div class="quantity-container">
                    <button onclick="changeQty(this,-1)">-</button>
                    <span class="quantity-display">0</span>
                    <button onclick="changeQty(this,1)">+</button>
                </div>

                <button class="add-to-cart" onclick="addToCart(this)">
                    Add to Cart
                </button>

            </div>
        </div>`;
    });
}

function changeQty(btn, change) {
    let qty = btn.parentElement.querySelector(".quantity-display");
    let value = parseInt(qty.innerText);
    value = Math.max(0, value + change);
    qty.innerText = value;
}

function addToCart(btn) {
    const card = btn.closest('.product-card') || btn.parentElement;
    const titleEl = card.querySelector('.product-title') || card.querySelector('h6');
    const title = titleEl ? titleEl.innerText.trim() : 'Product';
    const priceEl = card.querySelector('.price');
    const price = priceEl ? parseInt(priceEl.innerText.replace(/[^\d]/g, '')) : 0;
    const imgEl = card.querySelector('img');
    const img = imgEl ? imgEl.src : '';
    const qtySpan = card.querySelector('.quantity-display');
    const qty = qtySpan ? (parseInt(qtySpan.innerText) || 0) : 1;

    if (qty === 0) { alert('Please select quantity using + button first'); return; }

    const cart = JSON.parse(localStorage.getItem('kmart_cart') || '[]');
    const existing = cart.find(i => i.name === title && i.price === price);
    if (existing) existing.quantity += qty; else cart.push({ name: title, price: price, quantity: qty, img: img });
    localStorage.setItem('kmart_cart', JSON.stringify(cart));
    updateCartBadge();
    
    const originalText = btn.innerHTML;
    btn.innerHTML = `<i class="fa-solid fa-check"></i> Added to Cart!`;
    btn.style.background = '#10b981';
    
    setTimeout(() => {
        btn.innerHTML = originalText;
        btn.style.background = '';
        const qtySpan = btn.parentElement.querySelector('.quantity-display');
        if (qtySpan) qtySpan.innerText = 0;
    }, 1500);
}

function searchProduct() {
    let input = document.getElementById("searchInput").value.toLowerCase().trim();
    alert("Search not implemented in this category page.");
}

function updateCartBadge() {
    const cart = JSON.parse(localStorage.getItem('kmart_cart') || '[]');
    const count = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
    const badge = document.getElementById('cartBadge');
    if (badge) badge.innerText = count;
}
