<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>Login & Signup</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    height: 100vh;
}

/* LEFT IMAGE */
.left img {
    width: 100%;
    height: 100vh;
    object-fit: cover;
}

/* CARD */
.card {
    border-radius: 15px;
}

/* TOGGLE */
.toggle button.active {
    background: #4a6cf7;
    color: white;
}

/* SOCIAL */
.google { background: #db4437; color: white; border: none; }
.facebook { background: #1877f2; color: white; border: none; }

/* PASSWORD ICON */
.password-box {
    position: relative;
}
.password-box i {
    position: absolute;
    right: 12px;
    top: 12px;
    cursor: pointer;
}

/* OTP BOX */
.otp-box {
    display: none;
    background: #e9f2ff;
    padding: 6px;
    border-radius: 6px;
    text-align: center;
    font-weight: bold;
}

/* OR TEXT */
.or-text {
    text-align: center;
    margin: 8px 0;
    color: #888;
}

/* MOBILE */
@media (max-width:768px){
    .card { margin:20px; }
}
</style>
</head>

<body>

<div class="container-fluid">
<div class="row vh-100">

<!-- LEFT IMAGE -->
<div class="col-md-6 d-none d-md-block left">
    <img src="logo.jpeg">
</div>

<!-- RIGHT SIDE -->
<div class="col-md-6 d-flex justify-content-center align-items-center bg-light">
<div class="card p-5 shadow" style="width:380px;">

<!-- TOGGLE -->
<div class="d-flex mb-3 toggle gap-2">
<button id="loginBtn" class="btn btn-outline-primary flex-fill active">Login</button>
<button id="signupBtn" class="btn btn-outline-secondary flex-fill">Sign Up</button>
</div>

<!-- LOGIN -->
<div id="loginForm">
<h4 class="text-center mb-3">Login</h4>

<input type="text" id="loginUser" class="form-control mb-2" placeholder="Username">

<div class="password-box mb-2">
<input type="password" id="loginPass" class="form-control" placeholder="Password">
<i class="fa fa-eye" onclick="togglePassword('loginPass',this)"></i>
</div>

<input type="text" id="mobile" class="form-control mb-2" placeholder="Mobile (Optional)">

<div id="loginOtpBox" class="otp-box mb-2"></div>

<input type="text" id="loginOTP" class="form-control mb-2" placeholder="Enter OTP">

<button class="btn btn-outline-primary w-100 mb-2" onclick="sendLoginOTP()">Send OTP</button>

<button class="btn btn-primary w-100 mb-2" onclick="login()">Login</button>

<div class="text-end mb-2">
<a href="#" onclick="forgotPassword()">Forgot Password?</a>
</div>

<div class="text-center text-muted my-2">OR</div>

<button class="btn google w-100 mb-2" onclick="googleLogin()">
<i class="fab fa-google"></i> Google
</button>

<button class="btn facebook w-100" onclick="facebookLogin()">
<i class="fab fa-facebook-f"></i> Facebook
</button>
</div>

<!-- SIGNUP -->
<div id="signupForm" class="d-none">
<h4 class="text-center mb-3">Create Account</h4>

<input type="text" id="signUser" class="form-control mb-2" placeholder="Username">
<input type="email" id="signEmail" class="form-control mb-2" placeholder="Email">

<div class="password-box mb-2">
<input type="password" id="signPass" class="form-control" placeholder="Password">
<i class="fa fa-eye" onclick="togglePassword('signPass',this)"></i>
</div>

<div class="or-text">OR</div>

<input type="text" id="signMobile" class="form-control mb-2" placeholder="Mobile">

<div id="signupOtpBox" class="otp-box mb-2"></div>

<input type="text" id="signupOTP" class="form-control mb-2" placeholder="Enter OTP">

<button class="btn btn-outline-primary w-100 mb-2" onclick="sendSignupOTP()">Send OTP</button>

<button class="btn btn-primary w-100" onclick="signup()">Sign Up</button>
</div>

</div>
</div>

</div>
</div>

<script>

// TOGGLE
const loginBtn=document.getElementById("loginBtn");
const signupBtn=document.getElementById("signupBtn");
const loginForm=document.getElementById("loginForm");
const signupForm=document.getElementById("signupForm");

loginBtn.onclick=()=>{
loginForm.classList.remove("d-none");
signupForm.classList.add("d-none");
loginBtn.classList.add("active");
signupBtn.classList.remove("active");
};

signupBtn.onclick=()=>{
signupForm.classList.remove("d-none");
loginForm.classList.add("d-none");
signupBtn.classList.add("active");
loginBtn.classList.remove("active");
};

// PASSWORD
function togglePassword(id,icon){
let input=document.getElementById(id);
if(input.type==="password"){
input.type="text";
icon.classList.replace("fa-eye","fa-eye-slash");
}else{
input.type="password";
icon.classList.replace("fa-eye-slash","fa-eye");
}
}

// OTP
let loginOTPGen, signupOTPGen;

function sendLoginOTP(){
let mobile=document.getElementById("mobile").value;
if(!/^[0-9]{10}$/.test(mobile)) return alert("Invalid mobile");

loginOTPGen=Math.floor(100000+Math.random()*900000);
let box=document.getElementById("loginOtpBox");
box.style.display="block";
box.innerText="OTP: "+loginOTPGen;
}

function sendSignupOTP(){
let mobile=document.getElementById("signMobile").value;
if(!/^[0-9]{10}$/.test(mobile)) return alert("Invalid mobile");

signupOTPGen=Math.floor(100000+Math.random()*900000);
let box=document.getElementById("signupOtpBox");
box.style.display="block";
box.innerText="OTP: "+signupOTPGen;
}

// LOGIN
function login(){
let user=document.getElementById("loginUser").value;
let pass=document.getElementById("loginPass").value;
let mobile=document.getElementById("mobile").value;
let otp=document.getElementById("loginOTP").value;

let stored=JSON.parse(localStorage.getItem("user"));

if(mobile!==""){
if(otp==loginOTPGen){
alert("Login Success");
window.location.href = "navbar.html";
}
else{
alert("Wrong OTP");
}
return;
}

if(!stored) return alert("No user found");

if(user===stored.username && pass===stored.password){
alert("Login Success");
window.location.href = "navbar.html";
}
else{
alert("Invalid credentials");
}
}

// SIGNUP
function signup(){
let user=document.getElementById("signUser").value;
let email=document.getElementById("signEmail").value;
let pass=document.getElementById("signPass").value;
let mobile=document.getElementById("signMobile").value;
let otp=document.getElementById("signupOTP").value;

if(mobile!==""){
if(otp!=signupOTPGen) return alert("Wrong OTP");
localStorage.setItem("user",JSON.stringify({mobile}));
}
else{
if(user===""||email===""||pass==="") return alert("Fill all fields");
localStorage.setItem("user",JSON.stringify({username:user,password:pass}));
}

alert("Signup Success");
loginBtn.click();
}

// FORGOT PASSWORD
function forgotPassword(){
let stored=JSON.parse(localStorage.getItem("user"));
if(!stored) return alert("No account");

let user=prompt("Enter username");
if(user!==stored.username) return alert("Not found");

alert("Password: "+stored.password);
}

// SOCIAL
function googleLogin(){ window.open("https://accounts.google.com/"); }
function facebookLogin(){ window.open("https://facebook.com/"); }

</script>

</body>
</html>
